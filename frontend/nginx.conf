server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    
    include /etc/nginx/mime.types;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
