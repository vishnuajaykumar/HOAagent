server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;
    
    include /etc/nginx/mime.types;

    location /admin/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
